name: Hostaway Pipeline

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6,12,18 * * *'

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    env:
      HOSTAWAY_TOKEN: ${{ secrets.HOSTAWAY_TOKEN }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas requests

      - name: Run reservations extraction
        run: python extract_reservations.py

      - name: Run finance fields extraction
        run: python extract_finance_fields.py

      - name: Build final report
        run: python build_final_report.py

      - name: Commit generated files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -f *.tsv
          git diff --cached --quiet || git commit -m "Automated data refresh"
          git push
